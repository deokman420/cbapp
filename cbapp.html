    <!-- Version 1.05 web (minimize when the window is locked)-->
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        height: 100vh;
        overflow: hidden;
        transition: background 0.5s ease;
      }
      .light-mode {
        background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
        color: #000;
      }
      .dark-mode {
        background: linear-gradient(135deg, #2c3e50, #1a252f);
        color: #ccc;
      }
      .whiteboard {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .window,
      .calculator,
      .task-window,
      .clock-window,
      .log-window,
      .help-window {
        position: absolute;
        min-width: 350px;
        min-height: 150px;
        background: rgba(255, 255, 255, 0.3);
        backdrop-filter: blur(5px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        overflow: hidden;
        transition: opacity 0.3s ease;
        transform: translate(0, 0);
      }
      .window.dragging,
      .calculator.dragging,
      .task-window.dragging,
      .clock-window.dragging,
      .log-window.dragging {
        opacity: 0.8;
      }
      .dark-mode .window,
      .dark-mode .calculator,
      .dark-mode .task-window,
      .dark-mode .clock-window,
      .dark-mode .log-window {
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(200, 200, 200, 0.3);
      }
      /* Legacy controls flex rule removed - now in modern section near header styles */
      /* Legacy close button colors removed - now using modern muted/accent variables */
      .window-content {
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .textarea-container {
        position: relative;
        display: flex;
        border: 1px solid;
        border-radius: 5px;
        overflow: hidden;
        transition: border-color 0.5s ease;
        resize: both;
        min-width: 350px;
        min-height: 200px;
        width: 350px;
      }
      .light-mode .textarea-container {
        border-color: #ccc;
      }
      .dark-mode .textarea-container {
        border-color: #555;
      }
      .line-numbers {
        width: 30px;
        background: rgba(200, 200, 200, 0.5);
        color: #333;
        text-align: right;
        padding: 5px;
        font-family: monospace;
        font-size: 14px;
        line-height: 1.5;
        user-select: none;
        border-right: 1px solid #ccc;
        transition: background 0.5s ease;
      }
      .dark-mode .line-numbers {
        background: rgba(80, 80, 80, 0.5);
        color: #aaa;
        border-right-color: #555;
      }
      textarea {
        flex: 1;
        min-height: 100px;
        min-width: 150px;
        padding: 5px;
        font-family: monospace;
        font-size: 14px;
        line-height: 1.5;
        border: none;
        resize: none;
        outline: none;
        background: transparent;
        transition: color 0.5s ease;
        overflow: auto;
      }
      textarea[readonly] {
        background: rgba(0, 0, 0, 0.1);
      }
      .dark-mode textarea[readonly] {
        background: rgba(255, 255, 255, 0.1);
      }
      .light-mode textarea {
        color: #000;
      }
      .dark-mode textarea {
        color: #fff;
      }
      .note-log-input-container {
        display: flex;
        gap: 5px;
      }
      .note-log-input {
        flex: 1;
        padding: 5px;
        font-size: 14px;
        border: 1px solid #ccc;
        border-radius: 5px;
        outline: none;
      }
      .dark-mode .note-log-input {
        border-color: #555;
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
      }
      .note-log-button {
        padding: 5px 10px;
        font-size: 14px;
        border-radius: 5px;
        cursor: pointer;
        background: rgba(255, 165, 0, 0.5);
        transition: background 0.3s ease;
      }
      .note-log-button:hover {
        background: rgba(255, 165, 0, 0.7);
      }
      .format-buttons {
        display: flex;
        justify-content: center;
        gap: 5px;
        flex-wrap: wrap;
      }
      .counts {
        font-size: 12px;
      }
      .calculator-content,
      .clock-content,
      .log-content {
        padding: 10px;
      }
      .calculator-input,
      .calculator-display,
      .log-input {
        width: 100%;
        padding: 10px;
        font-size: 18px;
        text-align: left;
        border: none;
        background: rgba(255, 255, 255, 0.3);
        color: #000;
        border-radius: 5px;
        margin-bottom: 10px;
        box-sizing: border-box;
      }
      .dark-mode .calculator-input,
      .dark-mode .calculator-display,
      .dark-mode .log-input {
        background: rgba(0, 0, 0, 0.3);
        color: #fff;
      }
      .calculator-display {
        background: rgba(255, 255, 255, 0.4);
        text-align: right;
      }
      .dark-mode .calculator-display {
        background: rgba(0, 0, 0, 0.4);
      }
      .calculator-buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 5px;
      }
      .calculator-buttons button,
      .log-input-container button {
        padding: 15px;
        font-size: 16px;
        border-radius: 5px;
        cursor: pointer;
        transition: background 0.3s ease;
      }
      .calculator-buttons .number {
        background: rgba(200, 200, 200, 0.5);
      }
      .light-mode .calculator-buttons .number:hover {
        background: rgba(180, 180, 180, 0.5);
      }
      .dark-mode .calculator-buttons .number {
        background: rgba(100, 100, 100, 0.5);
      }
      .dark-mode .calculator-buttons .number:hover {
        background: rgba(120, 120, 120, 0.5);
      }
      .calculator-buttons .operation,
      .log-input-container button {
        background: rgba(255, 165, 0, 0.5);
      }
      .calculator-buttons .operation:hover,
      .log-input-container button:hover {
        background: rgba(255, 165, 0, 0.7);
      }
      .calculator-buttons .special {
        background: rgba(255, 0, 0, 0.5);
      }
      .calculator-buttons .special:hover {
        background: rgba(255, 0, 0, 0.7);
      }
      /* Legacy .calculator-history / .log-list background rules removed - unified in modern phbeks section */
      .nav-menu {
        position: fixed;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 10px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        padding: 8px 15px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        z-index: 1000;
        transition: all 0.3s ease;
        width: max-content;
        max-width: none;
        flex-wrap: nowrap;
      }

      .nav-row {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .dark-mode .nav-menu {
        background: rgba(0, 0, 0, 0.3);
        box-shadow: 0 4px 20px rgba(255, 255, 255, 0.1);
      }
      .nav-menu.collapsed {
        width: 40px;
        padding: 8px;
      }
      .nav-menu button,
      .nav-menu a {
        position: relative;
        padding: 0 14px;
        height: 36px;
        font-size: 12px;
        border-radius: 8px;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        gap: 5px;
        text-decoration: none;
        color: #fff;
        white-space: nowrap;
      }

      .nav-menu .nav-sticky {
        min-width: 140px;
        padding: 0 18px;
      }
      .light-mode .nav-menu button,
      .light-mode .nav-menu a {
        background: #0062cc;
      }
      .light-mode .nav-menu button:hover,
      .light-mode .nav-menu a:hover {
        background: #0056b3;
        transform: translateY(-2px);
        box-shadow: 0 2px 8px rgba(0, 123, 255, 0.5);
      }
      .dark-mode .nav-menu button,
      .dark-mode .nav-menu a {
        background: #2a66aa;
      }
      .dark-mode .nav-menu button:hover,
      .dark-mode .nav-menu a:hover {
        background: #285a94;
        transform: translateY(-2px);
        box-shadow: 0 2px 8px rgba(74, 144, 226, 0.5);
      }
      #theme-toggle,
      #log-toggle {
        background: #565e64;
      }
      .dark-mode #theme-toggle,
      .dark-mode #log-toggle {
        background: #565e64;
      }
      #theme-toggle:hover,
      #log-toggle:hover {
        background: #494f54;
        box-shadow: 0 2px 8px rgba(108, 117, 125, 0.5);
      }
      .nav-menu button.active {
        background: #28a745;
      }
      .nav-menu button.active:hover {
        background: #218838;
      }
      .nav-menu button::after,
      .nav-menu a::after {
        display: none;
      }

      #nav-tooltip {
        position: fixed;
        background: rgba(12, 15, 22, 0.92);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 11px;
        line-height: 1.2;
        min-height: 24px;
        min-width: 120px;
        text-align: center;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.15s ease;
        z-index: 3000;
      }

      #nav-tooltip.visible {
        opacity: 1;
        pointer-events: auto;
      }
      .nav-menu button:hover::after,
      .nav-menu a:hover::after {
        opacity: 1;
      }
      .nav-group {
        display: flex;
        gap: 5px;
        padding: 0 10px;
        border-right: 1px solid rgba(255, 255, 255, 0.2);
      }
      .nav-group:last-child {
        border-right: none;
      }
      .nav-toggle {
        display: none;
        font-size: 18px;
        padding: 5px 10px;
      }
      .nav-menu.collapsed .nav-group,
      .nav-menu.collapsed button:not(.nav-toggle),
      .nav-menu.collapsed a {
        display: none;
      }
      .nav-menu.collapsed .nav-toggle {
        display: block;
      }
      @media (max-width: 600px) {
        .nav-menu {
          top: 5px;
          bottom: auto;
          padding: 5px;
        }
        .nav-menu button,
        .nav-menu a {
          padding: 6px 10px;
          font-size: 11px;
        }
      }
      #status {
        position: fixed;
        bottom: 50px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 12px;
        padding: 5px 10px;
        background: rgba(0, 0, 0, 0.5);
        color: #fff;
        border-radius: 5px;
        display: none;
        z-index: 2000;
      }
      #search-replace {
        margin-top: 5px;
        display: none;
      }
      #search-replace.active {
        display: block;
      }
      .task-content {
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .task-input-container {
        display: flex;
        gap: 5px;
      }
      .task-input {
        flex: 1;
        padding: 5px;
        font-size: 14px;
        border: 1px solid #ccc;
        border-radius: 5px;
        outline: none;
      }
      .dark-mode .task-input {
        border-color: #555;
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
      }
      /* Legacy .task-list border/background removed - now handled by modern unified rule */
      .task-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 5px;
        font-size: 14px;
      }
      .task-item.completed {
        text-decoration: line-through;
        color: #888;
      }
      .task-item input[type="checkbox"] {
        cursor: pointer;
      }
      .color-palette {
        display: flex;
        gap: 5px;
        margin-top: 5px;
      }
      .color-swatch {
        width: 20px;
        height: 20px;
        border-radius: 3px;
        cursor: pointer;
        border: 1px solid #ccc;
      }
      .color-swatch:hover {
        transform: scale(1.1);
      }
      .clock-content {
        padding: 10px;
        text-align: center;
        font-family: monospace;
      }
      .clock-time {
        font-size: 24px;
        margin-bottom: 5px;
      }
      .clock-date {
        font-size: 14px;
      }
      .log-content {
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .log-input-container {
        display: flex;
        gap: 5px;
      }
      .log-item {
        padding: 5px;
        font-size: 14px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      .dark-mode .log-item {
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      .log-item:last-child {
        border-bottom: none;
      }
      .log-item span {
        font-family: monospace;
      }

      .help-content {
        padding: 12px;
        height: calc(100% - 34px);
        overflow: auto;
      }

      /* Help window now inherits the unified scrollbar styles above */

      .help-text {
        margin: 0;
        font-family: monospace;
        font-size: 13px;
        line-height: 1.5;
        white-space: pre-wrap;
      }

      .t2-window .window-content {
        padding-bottom: 12px;
      }

      .t2-window .t2-textarea {
        width: 100%;
        min-height: 240px;
        padding: 10px;
        border: none;
        border-radius: 10px;
        background: transparent;
        color: var(--text);
        font-family: var(--mono);
        resize: none;
        outline: none;
        overflow: auto;
        display: block;
      }

      .t2-window .textarea-container {
        width: 100% !important;
        min-height: 240px;
        resize: both;
        overflow: auto;
      }

      .t2-window .line-numbers {
        display: none;
      }

      .t2-window .note-log-input-container {
        margin-top: 10px;
      }
      #log-toggle {
        background: #0062cc;
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 12px;
        transition: all 0.2s ease;
      }

      #log-toggle:hover {
        background: #0056b3;
        transform: translateY(-2px);
        box-shadow: 0 2px 8px rgba(0, 123, 255, 0.5);
      }

      .dark-mode #log-toggle {
        background: #2a66aa;
      }

      .dark-mode #log-toggle:hover {
        background: #285a94;
        transform: translateY(-2px);
        box-shadow: 0 2px 8px rgba(74, 144, 226, 0.5);
      }

      #log-toggle.active {
        background: #28a745;
      }

      #log-toggle.active:hover {
        background: #218838;
      }

      .drawing-window {
        position: absolute;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid #ccc;
        border-radius: 10px;
        overflow: hidden;
        resize: both;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        transition: background 0.3s ease, box-shadow 0.3s ease;
      }

      .dark-mode .drawing-window {
        background: rgba(0, 0, 0, 0.8);
        border: 1px solid #555;
        box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
      }

      .drawing-header {
        background: rgba(200, 200, 200, 0.5);
        padding: 5px 10px;
        cursor: default;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        transition: background 0.3s ease;
      }

      .dark-mode .drawing-header {
        background: rgba(80, 80, 80, 0.5);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .drawing-toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px;
        background: rgba(240, 240, 240, 0.9);
        border-bottom: 1px solid #ccc;
        transition: background 0.3s ease;
      }

      .dark-mode .drawing-toolbar {
        background: rgba(50, 50, 50, 0.9);
        border-bottom: 1px solid #555;
      }

      .drawing-canvas {
        display: block;
        width: 100%;
        height: calc(100% - 80px);
        cursor: crosshair;
        background: transparent;
      }

      .sticky-note-window {
        position: absolute;
        background: #ffff88;
        border: 1px solid #ccc;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        overflow: hidden;
        resize: both;
        transition: background 0.3s ease, box-shadow 0.3s ease;
      }

      .dark-mode .sticky-note-window {
        background: #444444;
        border: 1px solid #555;
        box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
      }

      .sticky-note-header {
        background: rgba(200, 200, 200, 0.5);
        padding: 5px 10px;
        cursor: default;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      }

      .dark-mode .sticky-note-header {
        background: rgba(80, 80, 80, 0.5);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .sticky-note-toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 5px 10px;
        background: rgba(240, 240, 240, 0.9);
        border-bottom: 1px solid #ccc;
      }

      .dark-mode .sticky-note-toolbar {
        background: rgba(50, 50, 50, 0.9);
        border-bottom: 1px solid #555;
      }

      .sticky-note-content {
        width: 100%;
        height: calc(100% - 60px);
        padding: 10px;
        font-family: Arial, sans-serif;
        font-size: 14px;
        border: none;
        outline: none;
        resize: none;
        background: transparent;
        color: #000;
      }

      .dark-mode .sticky-note-content {
        color: #fff;
      }
      .task-window {
        resize: both;
        overflow: hidden;
      }

      /* Duplicate legacy .task-list styles removed - modern unified rule at ~1217 handles consistency */
      .countdown-timer-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin-top: 15px;
        gap: 8px;
      }
      .countdown-controls {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .countdown-display {
        font-family: monospace;
        font-size: 20px;
        margin-top: 5px;
      }
      .clear-note-container {
        position: absolute;
        left: 18px;
        bottom: 18px;
        z-index: 10;
      }
      .clear-note-button {
        padding: 2px 2px;
        font-size: 8px;
        border-radius: 2px;
        background: #f55;
        color: #fff;
        border: 1px solid #f55;
        cursor: pointer;
        box-shadow: none;
        transition: background 0.2s;
      }
      .clear-note-button--mini {
        height: 16px;
        padding: 0 6px;
        font-size: 8px;
        line-height: 1;
        align-self: center;
        background: #f55;
        color: #fff;
        border: 1px solid #f55;
        box-shadow: none;
      }
      .clear-note-button:hover {
        background: #d22;
        border-color: #d22;
      }
      .note-dropdown {
        display: none;
        position: absolute;
        left: 0;
        bottom: calc(100% + 28px);
        min-width: 180px;
        background: #fff;
        color: #222;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        z-index: 2000;
        padding: 5px 0;
      }
      .dark-mode .note-dropdown {
        background: #222;
        color: #fff;
      }
      .note-dropdown .note-dropdown-item {
        padding: 8px 16px;
        cursor: pointer;
        white-space: nowrap;
      }
      .nav-tooltip-title {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        opacity: 0.8;
      }
      .nav-tooltip-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-top: 6px;
      }
      .nav-tooltip-link,
      .nav-tooltip-empty {
        background: transparent;
        border: 0;
        color: var(--text);
        font-family: var(--mono);
        font-size: 11px;
        text-align: left;
        padding: 0;
        cursor: pointer;
      }
      .nav-tooltip-link:hover {
        color: var(--accent);
      }
      .note-dropdown .note-dropdown-item:hover {
        background: #007bff;
        color: #fff;
      }
      .nav-group {
        position: relative; /* Needed for dropdown positioning */
      }
      /* Legacy minimize-window hard-coded colors removed - now controlled by modern .minimize-window rule using variables */
      .sticky-dropdown {
        display: none;
        position: absolute;
        left: 0;
        bottom: calc(100% + 28px);
        min-width: 180px;
        background: #fff;
        color: #222;
        border-radius: 8px;

        Download current session as .html
      </a>
    </div>
    <script type="text/javascript">
      function changeStickyNoteColor(windowId, color) {
        const stickyNote = document.getElementById(windowId);
        if (stickyNote) {
          stickyNote.style.backgroundColor = color;
          saveSession();
          showStatus("Sticky note color changed!");
        }
      }

      function changeStickyNoteTextColor(windowId, color) {
        const stickyNoteContent = document.querySelector(
          `#${windowId} .sticky-note-content`
        );
        if (stickyNoteContent) {
          stickyNoteContent.style.color = color;
          saveSession();
          showStatus("Sticky note text color changed!");
        }
      }

      let windowCount = 0;
      let noteCount = 0;
      let taskCount = 0;
      let stickyCount = 0;
      let t2Count = 0;
      let calculatorCount = 0;
      let clockCount = 0;
      let activeWindow = null;
      let lockedWindows = {};
      let zIndexCounter = 1;
      let activeTool = null;
      let offsetX = 0;
      let offsetY = 0;
      let calculatorVisible = false;
      let clockVisible = false;
      let logVisible = false;
      let calculatorHistory = [];
      let logEntries = [];
      const MAX_WINDOWS = 25;

      // --- Internal stability helpers (no UI or behavior change) ---
      let _saveTimer = null;
      function debouncedSave(delay = 180) {
        if (_saveTimer) clearTimeout(_saveTimer);
        _saveTimer = setTimeout(() => {
          _saveTimer = null;
          try { saveSession(); } catch (e) { /* swallow */ }
        }, delay);
      }

      // Map of windowId -> ResizeObserver for cleanup
      const _resizeObservers = Object.create(null);

      function registerResizeObserver(windowId, observer) {
        if (_resizeObservers[windowId]) {
          try { _resizeObservers[windowId].disconnect(); } catch (e) {}
        }
        _resizeObservers[windowId] = observer;
      }

      function disconnectResizeObserver(windowId) {
        const obs = _resizeObservers[windowId];
        if (obs) {
          try { obs.disconnect(); } catch (e) {}
          delete _resizeObservers[windowId];
        }
      }

      function setMaxDimensions() {
        const textareaContainers = document.querySelectorAll(
          ".textarea-container"
        );
        textareaContainers.forEach((container) => {
          const windowElement = container.closest(".window");
          if (windowElement) {
            const headerHeight =
              windowElement.querySelector(".window-header").offsetHeight || 30;
            const paddingAndBorders = 22;
            const buttonsHeight =
              windowElement.querySelector(".format-buttons")?.offsetHeight || 0;
            const countsHeight =
              windowElement.querySelector(".counts")?.offsetHeight || 0;
            const logInputHeight =
              windowElement.querySelector(".note-log-input-container")
                ?.offsetHeight || 0;
            const maxHeight =
              window.innerHeight -
              headerHeight -
              paddingAndBorders -
              buttonsHeight -
              countsHeight -
              logInputHeight -
              20;
            const maxWidth = window.innerWidth - 32 - 20;
            container.style.maxHeight = `${maxHeight}px`;
            container.style.maxWidth = `${Math.min(
              maxWidth,
              window.innerWidth - 50
            )}px`;
            windowElement.style.maxWidth = `${Math.min(
              maxWidth + 32,
              window.innerWidth - 30
            )}px`;
            windowElement.style.maxHeight = `${
              maxHeight +
              headerHeight +
              paddingAndBorders +
              buttonsHeight +
              countsHeight +
              logInputHeight
            }px`;
          }
        });
      }
      function addStickyNote() {
        if (
          document.querySelectorAll(".sticky-note-window").length >= MAX_WINDOWS
        ) {
          showStatus("Maximum number of sticky notes reached.");
          return;
        }

        windowCount++;
        stickyCount++;
        const stickyLabel = stickyCount > 1 ? `Sticky Note ${stickyCount}` : "Sticky Note";
        const windowId = `sticky-note-${windowCount}`;
        const windowsContainer = document.getElementById("windows");
        const newStickyNote = document.createElement("div");
        newStickyNote.className = "sticky-note-window";
        newStickyNote.id = windowId;
        newStickyNote.style.left = "50";
        newStickyNote.style.top = "50";
        newStickyNote.style.zIndex = zIndexCounter++;
        newStickyNote.dataset.x = 50;
        newStickyNote.dataset.y = 50;
        newStickyNote.dataset.width = 200;
        newStickyNote.dataset.height = 200;
        newStickyNote.style.width = "300";
        newStickyNote.style.height = "300";
        const computedStyles = getComputedStyle(document.body);
        const defaultBgColor =
          computedStyles.getPropertyValue("--bg-card").trim() || "#141820";
        const defaultTextColor =
          computedStyles.getPropertyValue("--text").trim() || "#e2e8f0";
        newStickyNote.style.backgroundColor = defaultBgColor;

        newStickyNote.innerHTML = `
    <div class="sticky-note-header">
        <span class="sticky-note-title">${stickyLabel}</span>
        <div class="sticky-note-controls">
            <span class="edit-window" onclick="startRename('${windowId}')">✏️</span>
            <span class="minimize-window" onclick="minimizeStickyNote('${windowId}')">🗕</span>
            <span class="sticky-lock-window" onclick="toggleWindowLock('${windowId}')">🔓</span>
            <span class="close-sticky-note" onclick="closeWindow('${windowId}')">×</span>
        </div>
    </div>
    <div class="sticky-note-toolbar">
        <label for="sticky-note-color-${windowId}">Background:</label>
        <input type="color" id="sticky-note-color-${windowId}" value="${defaultBgColor}" onchange="changeStickyNoteColor('${windowId}', this.value)">
        <label for="sticky-note-text-color-${windowId}">Text:</label>
        <input type="color" id="sticky-note-text-color-${windowId}" value="${defaultTextColor}" onchange="changeStickyNoteTextColor('${windowId}', this.value)">
    </div>
    <textarea class="sticky-note-content" placeholder="Write something..." style="color: ${defaultTextColor};"></textarea>
`;

        windowsContainer.appendChild(newStickyNote);
        makeDraggable(newStickyNote);
        newStickyNote.onclick = (e) => {
          setActiveWindow(windowId);
          const rect = newStickyNote.getBoundingClientRect();
          newStickyNote.dataset.x = rect.left;
          newStickyNote.dataset.y = rect.top;
          saveSession();
        };
        const resizeObserver = new ResizeObserver(() => {
          const rect = newStickyNote.getBoundingClientRect();
          newStickyNote.dataset.width = newStickyNote.offsetWidth;
          newStickyNote.dataset.height = newStickyNote.offsetHeight;
          newStickyNote.dataset.x = rect.left;
          newStickyNote.dataset.y = rect.top;
          debouncedSave(220);
        });
        registerResizeObserver(windowId, resizeObserver);
        resizeObserver.observe(newStickyNote);
        return newStickyNote;
      }

      function saveSession() {
        const session = {};
        document
          .querySelectorAll(".window, .task-window")
          .forEach((windowElement) => {
            const windowId = windowElement.id;
            const textarea = document.getElementById(`clipboard-${windowId}`);
            const title = windowElement.querySelector(
              ".window-title, .task-title, .sticky-note-title"
            ).textContent;
            session[windowId] = {
              position: {
                left: windowElement.dataset.x || "50",
                top: windowElement.dataset.y || "50",
              },
              width: windowElement.offsetWidth,
              height: windowElement.offsetHeight,
              content: textarea ? textarea.value : "",
              name: title,
              isTaskWindow: windowElement.classList.contains("task-window"),
              locked: windowElement.dataset.locked === "true", // Add this line
              tasks: windowElement.classList.contains("task-window")
                ? Array.from(windowElement.querySelectorAll(".task-item")).map(
                    (item) => ({
                      text: item.querySelector("span").textContent,
                      completed: item.classList.contains("completed"),
                    })
                  )
                : [],
            };
          });
        const clock = document.getElementById("clock");
        if (clock) {
          session.clock = {
            visible: clockVisible,
            position: {
              left: clock.dataset.x || "50",
              top: clock.dataset.y || "50",
            },
            width: clock.dataset.width || "200",
            height: clock.dataset.height || "150",
            name: clock.querySelector(".clock-title").textContent,
            clockFormat:
              document.getElementById("clock-format-clock")?.value || "12",
          };
        }
        if (document.getElementById("calculator")) {
          session.calculator = {
            visible: calculatorVisible,
            history: calculatorHistory,
            position: {
              left: document.getElementById("calculator").dataset.x || "50",
              top: document.getElementById("calculator").dataset.y || "50",
            },
            width: document.getElementById("calculator").dataset.width || "250",
          };
        }
        const log = document.getElementById("log");
        if (log) {
          session.log = {
            visible: logVisible,
            position: {
              left: log.dataset.x || "50",
              top: log.dataset.y || "50",
            },
            width: log.dataset.width || "300",
            height: log.dataset.height || "300",
            name: log.querySelector(".log-title").textContent,
            logs: Array.from(document.querySelectorAll(".log-item")).map(
              (item) => ({
                timestamp: item.querySelector(".timestamp").textContent,
                description: item.querySelector(".description").textContent,
              })
            ),
          };
        } else {
          session.log = {
            visible: logVisible,
            position: { left: "50", top: "50" },
            width: "300",
            height: "300",
            name: "Log",
            logs: logEntries,
          };
        }
        session.theme = document.body.className || "light-mode";
        document
          .querySelectorAll(".sticky-note-window")
          .forEach((stickyNote) => {
            const windowId = stickyNote.id;
            const content = stickyNote.querySelector(
              ".sticky-note-content"
            ).value;
            const bgColor = stickyNote.style.backgroundColor;
            const textColor =
              stickyNote.querySelector(".sticky-note-content").style.color ||
              "#000";
            const title =
              stickyNote.querySelector(".sticky-note-title").textContent;
            session[windowId] = {
              locked: stickyNote.dataset.locked === "true",
              position: {
                left: stickyNote.dataset.x || "50",
                top: stickyNote.dataset.y || "50",
              },
              width: stickyNote.offsetWidth,
              height: stickyNote.offsetHeight,
              content,
              color: bgColor,
              textColor,
              name: title,
            };
          });
        session.calendarEvents = JSON.parse(
          localStorage.getItem("calendarEvents") || "{}"
        );
        try {
          const serialized = JSON.stringify(session);
          // Guard against localStorage quota exhaustion (typical limit ~5-10MB)
          if (serialized.length > 4500000) {
            console.warn("Session too large to save safely, skipping write.");
            return;
          }
          localStorage.setItem("notepadSession", serialized);
        } catch (e) {
          console.error("Failed to save session to localStorage:", e);
          showStatus("Failed to save session.");
        }
        if (session.calendarEvents) {
          try {
            const cal = JSON.stringify(session.calendarEvents);
            if (cal.length < 500000) {
              localStorage.setItem("calendarEvents", cal);
            }
          } catch (e) {
            console.warn("Calendar events too large to persist.");
          }
        }
      }

      function addWindow() {
        if (
          document.querySelectorAll(
            ".window, .task-window, .clock-window, .log-window"
          ).length >= MAX_WINDOWS
        ) {
          showStatus("Maximum number of windows reached.");
          return;
        }
        windowCount++;
        noteCount++;
        const noteLabel = noteCount > 1 ? `Note ${noteCount}` : "Note";
        const windowId = `window${windowCount}`;
        const windowsContainer = document.getElementById("windows");
        const newWindow = document.createElement("div");
        newWindow.className = "window";

        // Center the window

        newWindow.dataset.y = top;
        newWindow.dataset.width = defaultWidth;
        newWindow.dataset.height = defaultHeight;
        newWindow.style.width = `${defaultWidth}px`;
        newWindow.innerHTML = `

            <span class="window-title">${noteLabel}</span>

        <span class="close-window" onclick="closeWindow('${windowId}')">×</span>
    </div>

        <div class="window-content">

                <div class="line-numbers" id="line-numbers-${windowId}">1</div>

        windowsContainer.appendChild(newWindow);
        makeDraggable(newWindow);
        newWindow.onclick = () => setActiveWindow(windowId);
        setActiveWindow(windowId);
        const textarea = document.getElementById(`clipboard-${windowId}`);

        // Debounced persistence for stability (no behavior change)
        textarea.addEventListener("input", () => debouncedSave(160), { passive: true });
        const logInput = document.getElementById(`note-log-input-${windowId}`);
        logInput.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            addNoteLogEntry(windowId);
          }
        });
        updateLineNumbers(windowId);
        updateCounts(windowId);
        setMaxDimensions();
        saveSession();
        const textareaContainer = newWindow.querySelector(
          ".textarea-container"
        );
        const resizeObserver = new ResizeObserver(() => {
          updateWindowSize(windowId);
          debouncedSave(220);
        });
        registerResizeObserver(windowId, resizeObserver);
        resizeObserver.observe(textareaContainer);
        return newWindow;
      }

      function addDrawingWindow() {
        if (
          document.querySelectorAll(
            ".window, .task-window, .clock-window, .log-window, .drawing-window"
          ).length >= MAX_WINDOWS
        ) {
          showStatus("Maximum number of windows reached.");
          return;
        }

        const windowsContainer = document.getElementById("windows");
        const newWindow = document.createElement("div");
        newWindow.className = "drawing-window";
        newWindow.id = `drawing-${windowCount}`;
        newWindow.style.left = "50px";
        newWindow.style.top = "50px";
        newWindow.style.zIndex = zIndexCounter++;
        newWindow.dataset.x = 50;
        newWindow.dataset.y = 50;
        newWindow.dataset.width = 600;
        newWindow.dataset.height = 400;
        newWindow.style.width = "600px";
        newWindow.style.height = "400px";

        newWindow.innerHTML = `
                <div class="drawing-header">
                    <span class="drawing-title">Drawing ${windowCount}</span>
                    <div class="drawing-controls">
                        <span class="close-drawing" onclick="closeWindow('${newWindow.id}')">×</span>
                    </div>
                </div>
                <div class="drawing-toolbar">
                    <label for="color-picker-${windowCount}">Color:</label>
                    <input type="color" id="color-picker-${windowCount}" value="#000000">
                    <label for="cursor-size-${windowCount}">Cursor Size:</label>
                    <input type="range" id="cursor-size-${windowCount}" min="1" max="50" value="5">
                    <button onclick="undoDrawing('${newWindow.id}')">Undo</button>
                    <button onclick="redoDrawing('${newWindow.id}')">Redo</button>
                </div>
                <canvas id="canvas-${windowCount}" class="drawing-canvas"></canvas>
            `;

        windowsContainer.appendChild(newWindow);
        makeDraggable(newWindow);
        newWindow.onclick = () => setActiveWindow(newWindow.id);
        setActiveWindow(newWindow.id);

        const canvas = document.getElementById(`canvas-${windowCount}`);
        const colorPicker = document.getElementById(
          `color-picker-${windowCount}`
        );
        const cursorSize = document.getElementById(
          `cursor-size-${windowCount}`
        );
        const ctx = canvas.getContext("2d");

        canvas.width = newWindow.offsetWidth;
        canvas.height = newWindow.offsetHeight - 80;

        let drawing = false;
        let currentColor = colorPicker.value;
        let currentSize = cursorSize.value;
        let paths = [];
        let undonePaths = [];

        canvas.addEventListener("mousedown", (e) => {
          drawing = true;
          ctx.beginPath();
          ctx.moveTo(e.offsetX, e.offsetY);
          paths.push({
            color: currentColor,
            size: currentSize,
            points: [{ x: e.offsetX, y: e.offsetY }],
          });
          undonePaths = [];
        });

        canvas.addEventListener("mousemove", (e) => {
          if (!drawing) return;
          ctx.lineTo(e.offsetX, e.offsetY);
          ctx.strokeStyle = currentColor;
          ctx.lineWidth = currentSize;
          ctx.lineCap = "round";
          ctx.stroke();
          paths[paths.length - 1].points.push({ x: e.offsetX, y: e.offsetY });
        });

        canvas.addEventListener("mouseup", () => {
          drawing = false;
          ctx.closePath();
        });

        canvas.addEventListener("mouseout", () => {
          drawing = false;
          ctx.closePath();
        });

        colorPicker.addEventListener("input", () => {
          currentColor = colorPicker.value;
        });

        cursorSize.addEventListener("input", () => {
          currentSize = cursorSize.value;
        });

        window.undoDrawing = (id) => {
          if (paths.length === 0) return;
          undonePaths.push(paths.pop());
          redrawCanvas(canvas, ctx, paths);
        };

        window.redoDrawing = (id) => {
          if (undonePaths.length === 0) return;
          paths.push(undonePaths.pop());
          redrawCanvas(canvas, ctx, paths);
        };

        saveSession();
        showStatus("Drawing window created!");
        return newWindow;
      }

      function redrawCanvas(canvas, ctx, paths) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        paths.forEach((path) => {
          ctx.beginPath();
          ctx.strokeStyle = path.color;
          ctx.lineWidth = path.size;
          ctx.lineCap = "round";
          path.points.forEach((point, index) => {
            if (index === 0) {
              ctx.moveTo(point.x, point.y);
            } else {
              ctx.lineTo(point.x, point.y);
            }
          });
          ctx.stroke();
          ctx.closePath();
        });
      }

      function addTaskWindow() {
        if (
          document.querySelectorAll(
            ".window, .task-window, .clock-window, .log-window"
          ).length >= MAX_WINDOWS
        ) {
          showStatus("Maximum number of windows reached.");
          return;
        }
        windowCount++;
        taskCount++;
        const taskLabel = taskCount > 1 ? `Task List ${taskCount}` : "Task List";
        const windowId = `window${windowCount}`;
        const windowsContainer = document.getElementById("windows");
        const newWindow = document.createElement("div");
        const resizeObserver = new ResizeObserver(() => {
          newWindow.dataset.width = newWindow.offsetWidth;
          newWindow.dataset.height = newWindow.offsetHeight;
          debouncedSave(220);
        });
        registerResizeObserver(windowId, resizeObserver);
        resizeObserver.observe(newWindow);
        newWindow.className = "task-window";
        newWindow.id = windowId;
        newWindow.style.left = "50px";
        newWindow.style.top = "50px";
        newWindow.style.zIndex = zIndexCounter++;
        newWindow.dataset.x = 50;
        newWindow.dataset.y = 50;
        newWindow.dataset.width = 400;
        newWindow.dataset.height = 500;
        newWindow.style.width = "400px";
        newWindow.style.height = "500px";
        newWindow.innerHTML = `
        <div class="task-header">
            <span class="task-title">${taskLabel}</span>
            <div class="task-controls">
                <span class="edit-window" onclick="startRename('${windowId}')">✏️</span>
                <span class="close-task" onclick="closeWindow('${windowId}')">×</span>
            </div>
        </div>
      <div class="task-content">
    <div class="task-input-container">
        <input type="text" class="task-input" id="task-input-${windowId}" placeholder="Enter task...">
        <button class="note-log-button" onclick="addTask('${windowId}')">Add</button>
    </div>
    <div class="task-list" id="task-list-${windowId}"></div>
    <div class="format-buttons">
      <button class="clear-note-button clear-note-button--mini" onclick="clearTaskWindow('${windowId}')">Clear</button>
    </div>
</div>
    `;
        windowsContainer.appendChild(newWindow);
        makeDraggable(newWindow);
        newWindow.onclick = () => setActiveWindow(windowId);
        setActiveWindow(windowId);
        const taskInput = document.getElementById(`task-input-${windowId}`);
        taskInput.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            addTask(windowId);
          }
        });
        saveSession();
        showStatus("Task window created!");
        return newWindow;
      }
      function clearTaskWindow(windowId) {
        const taskList = document.getElementById(`task-list-${windowId}`);
        const taskInput = document.getElementById(`task-input-${windowId}`);
        if (taskList) {
          taskList.innerHTML = "";
        }
        if (taskInput) {
          taskInput.value = "";
        }
        saveSession();
        showStatus("Task list cleared!");
      }

      function addTask(windowId) {
        const taskInput = document.getElementById(`task-input-${windowId}`);
        const taskList = document.getElementById(`task-list-${windowId}`);
        if (!taskInput || !taskList) {
          showStatus("Error: Task input or list not found.");
          return;
        }
        const taskText = taskInput.value.trim();
        if (!taskText) {
          showStatus("Task cannot be empty.");
          return;
        }
        const taskItem = document.createElement("div");
        taskItem.className = "task-item";
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.onchange = () => toggleTaskCompletion(windowId, checkbox);
        const span = document.createElement("span");
        span.textContent = taskText;
        taskItem.appendChild(checkbox);
        taskItem.appendChild(span);
        taskList.appendChild(taskItem);
        taskInput.value = "";
        saveSession();
        showStatus("Task added!");
      }

      function toggleTaskCompletion(windowId, checkbox) {
        const taskItem = checkbox.parentElement;
        taskItem.classList.toggle("completed", checkbox.checked);
        saveSession();
      }

      function addNoteLogEntry(windowId) {
        const textarea = document.getElementById(`clipboard-${windowId}`);
        const logInput = document.getElementById(`note-log-input-${windowId}`);
        if (!textarea || !logInput) {
          showStatus("Error: Textarea or input not found.");
          return;
        }
        if (textarea.readOnly) {
          showStatus("Cannot add log: Window is locked.");
          return;
        }
        const description = logInput.value.trim();
        if (!description) {
          showStatus("Log entry cannot be empty.");
          return;
        }
        const now = new Date();
        const timestamp = now.toLocaleString("en-US", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: true,
        });
        const logEntry = `\n[${timestamp}]: ${description}\n`;
        textarea.value += logEntry;
        logInput.value = "";
        updateLineNumbers(windowId);
        updateCounts(windowId);
        updateWindowSize(windowId);
        saveSession();
        showStatus("Log entry added to note!");
      }

        const textarea = document.getElementById(`clipboard-${windowId}`);
        if (textarea && windowElement) {
          textarea.value = `CB App - Self-contained single file app

This cbapp.html is the complete application. No zip or extra files needed.

How to use:

      function calculate() {
        const input = document.getElementById("calculator-input");
        const display = document.getElementById("calculator-display");
        if (input && display) {
          let expression = input.value;
          if (!expression) {
            display.value = "0";
            return;
          }
          try {
            let result = evaluateExpression(expression);
            display.value = isFinite(result) ? result : "Error";
            calculatorHistory.push({ expression, result: display.value });
            updateCalculatorHistory();
            saveSession();
          } catch {
            display.value = "Error";
            calculatorHistory.push({ expression, result: "Error" });
            updateCalculatorHistory();
            saveSession();
          }
        }
      }

      function evaluateExpression(expression) {
        expression = expression.replace(/×/g, "*").replace(/%/g, "/100");
        while (expression.includes("√")) {
          const sqrtIndex = expression.indexOf("√");
          let number = "";
          let i = sqrtIndex + 1;
          while (i < expression.length && /\d|\./.test(expression[i])) {
            number += expression[i];
            i++;
          }
          const sqrtValue = Math.sqrt(parseFloat(number));
          expression =
            expression.substring(0, sqrtIndex) +
            sqrtValue +
            expression.substring(i);
        }
        const tokens = expression.match(/(\d*\.?\d+|[+\-*/])/g);
        if (!tokens) throw new Error("Invalid expression");
        let result = parseFloat(tokens[0]);
        for (let i = 1; i < tokens.length; i += 2) {
          const operator = tokens[i];
          const nextNumber = parseFloat(tokens[i + 1]);
          if (isNaN(nextNumber)) throw new Error("Invalid number");
          switch (operator) {
            case "+":
              result += nextNumber;
              break;
            case "-":
              result -= nextNumber;
              break;
            case "*":
              result *= nextNumber;
              break;
            case "/":
              if (nextNumber === 0) throw new Error("Division by zero");
              result /= nextNumber;
              break;
          }
        }
        return result;
      }

      function makeDraggable(element) {
        const header = element.querySelector(
          ".window-header, .calculator-header, .task-header, .clock-header, .log-header, .drawing-header, .sticky-note-header"
        );
        if (!header) return;

        let isDragging = false;
        let offsetX = 0;
        let offsetY = 0;

        header.onmousedown = function (e) {
          isDragging = true;

          element.style.zIndex = (zIndexCounter = Math.min(zIndexCounter + 1, 2147483640));
          offsetX = e.clientX - element.getBoundingClientRect().left;
          offsetY = e.clientY - element.getBoundingClientRect().top;
          document.body.style.userSelect = "none";
          element.classList.add("dragging");

          function onMouseMove(e) {
            if (!isDragging) return;
            let newX = e.clientX - offsetX;
            let newY = e.clientY - offsetY;
            newX = Math.max(
              0,
              Math.min(window.innerWidth - element.offsetWidth, newX)
            );
            newY = Math.max(
              0,
              Math.min(window.innerHeight - element.offsetHeight, newY)
            );
            element.style.left = newX + "px";
            element.style.top = newY + "px";
            element.dataset.x = newX;
            element.dataset.y = newY;
          }

          function onMouseUp() {
            if (isDragging) {
              isDragging = false;
              document.body.style.userSelect = "";
              element.classList.remove("dragging");
              document.removeEventListener("mousemove", onMouseMove);
              document.removeEventListener("mouseup", onMouseUp);
              if (typeof saveSession === "function") saveSession();
            }
          }

          document.addEventListener("mousemove", onMouseMove);
          document.addEventListener("mouseup", onMouseUp);
        };
      }

        const content = isSticky
          ? windowElement.querySelector(".sticky-note-content")
          : document.getElementById(`clipboard-${windowId}`);
        const lockBtn = windowElement.querySelector(
          ".lock-window, .sticky-lock-window"
        );
        const closeBtn = windowElement.querySelector(
          ".close-window, .close-sticky-note"
        );
        // Get minimize button (new)
        const minimizeBtn = windowElement.querySelector(
          ".minimize-window"
        );
        const controls = windowElement.querySelector(
          ".window-controls, .sticky-note-controls"
        );
        const header = windowElement.querySelector(
          ".window-header, .sticky-note-header"
        );

        // Toggle lock state
        const isLocked = windowElement.dataset.locked !== "true";
        windowElement.dataset.locked = isLocked;

        // Lock/unlock content editing
        if (content) {
          content.readOnly = isLocked;
          content.style.pointerEvents = isLocked ? "none" : "";
        }

        // Lock/unlock dragging and restore draggability
        if (header) {
          header.style.pointerEvents = isLocked ? "none" : "";
          if (isLocked) {
            header.onmousedown = null;
          } else {
            // Re-initialize dragging functionality
            header.onmousedown = function (e) {
              let isDragging = false;
              const offsetX =
                e.clientX - windowElement.getBoundingClientRect().left;
              const offsetY =
                e.clientY - windowElement.getBoundingClientRect().top;

              windowElement.style.zIndex = (zIndexCounter = Math.min(zIndexCounter + 1, 2147483640));
              document.body.style.userSelect = "none";
              windowElement.classList.add("dragging");

              function onMouseMove(e) {
                isDragging = true;
                let newX = e.clientX - offsetX;
                let newY = e.clientY - offsetY;
                newX = Math.max(
                  0,
                  Math.min(window.innerWidth - windowElement.offsetWidth, newX)
                );
                newY = Math.max(
                  0,
                  Math.min(window.innerHeight - windowElement.offsetHeight, newY)
                );
                windowElement.style.left = newX + "px";
                windowElement.style.top = newY + "px";
                windowElement.dataset.x = newX;
                windowElement.dataset.y = newY;
              }

              function onMouseUp() {
                isDragging = false;
                document.body.style.userSelect = "";
                windowElement.classList.remove("dragging");
                document.removeEventListener("mousemove", onMouseMove);
                document.removeEventListener("mouseup", onMouseUp);
                saveSession();
              }

              document.addEventListener("mousemove", onMouseMove);
              document.addEventListener("mouseup", onMouseUp);
            };
          }
        }

        // Lock/unlock resizing
        windowElement.style.resize = isLocked ? "none" : "both";

        // Lock/unlock controls
        if (closeBtn) {
          closeBtn.style.pointerEvents = isLocked ? "none" : "";
          closeBtn.style.opacity = isLocked ? "0.5" : "1";
        }

        // --- Allow minimize button to always work, even when locked ---
        if (minimizeBtn) {
          minimizeBtn.style.pointerEvents = "auto";
          minimizeBtn.style.opacity = "1";
        }
        // ---

        // Update lock icon
        if (lockBtn) {
          lockBtn.textContent = isLocked ? "🔒" : "🔓";
          lockBtn.classList.toggle("locked", isLocked);
          // Keep lock button clickable
          lockBtn.style.pointerEvents = "auto";
          lockBtn.style.opacity = "1";
        }

        showStatus(
          `${isSticky ? "Sticky Note" : "Window"} ${
            isLocked ? "locked" : "unlocked"
          }`
        );
        saveSession();
      }

      function setActiveWindow(windowId) {
        const windowElement = document.getElementById(windowId);
        if (!windowElement) return;
        activeWindow = windowId;
        document
          .querySelectorAll(".window, .task-window, .clock-window, .log-window")
          .forEach((win) => win.classList.remove("active"));
        windowElement.classList.add("active");

      function updateLineNumbers(windowId) {
        const textarea = document.getElementById(`clipboard-${windowId}`);
        const lineNumbers = document.getElementById(`line-numbers-${windowId}`);
        if (textarea && lineNumbers) {
          const lines = textarea.value.split("\n").length;

      function syncScroll(windowId) {
        const textarea = document.getElementById(`clipboard-${windowId}`);
        const lineNumbers = document.getElementById(`line-numbers-${windowId}`);

      function closeWindow(windowId) {
        const windowElement = document.getElementById(windowId);
        if (windowElement) {
          disconnectResizeObserver(windowId);
          windowElement.remove();
          delete lockedWindows[windowId];
          if (activeWindow === windowId) {
            const remainingWindows = document.querySelectorAll(
              ".window, .task-window, .clock-window, .log-window"
            );
            activeWindow =
              remainingWindows.length > 0 ? remainingWindows[0].id : null;
            if (activeWindow) setActiveWindow(activeWindow);
          }
          debouncedSave(80);

      let currentEditable = null;

      function startRename(windowId) {
        if (currentEditable) endRename();
        const windowElement = document.getElementById(windowId);
        if (windowElement) {
          const titleSpan = windowElement.querySelector(
            ".window-title, .task-title, .sticky-note-title"
          );
          titleSpan.contentEditable = true;
          titleSpan.focus();
          document.execCommand("selectAll", false, null); // Select all text for easy editing
          currentEditable = { windowId, element: titleSpan };

          // Listen for Enter, Escape, or blur
          titleSpan.addEventListener("keydown", handleRenameKeydown);
          titleSpan.addEventListener("blur", endRename);
          document.addEventListener("mousedown", handleOutsideClick);
        }
      }

      function handleRenameKeydown(e) {
        if (e.key === "Enter") {
          e.preventDefault();
          endRename();
        } else if (e.key === "Escape") {
          e.preventDefault();
          cancelRename();
        }
      }

      function handleOutsideClick(e) {
        if (
          currentEditable &&
          !e.target.closest(".window-title, .task-title, .sticky-note-title")
        ) {
          endRename();
        }
      }

      function endRename() {
        if (currentEditable) {
          const { windowId, element } = currentEditable;
          element.contentEditable = false;
          element.removeEventListener("keydown", handleRenameKeydown);
          element.removeEventListener("blur", endRename);
          document.removeEventListener("mousedown", handleOutsideClick);

          // Set default name if empty, based on window type
          let defaultName = "";
          if (element.classList.contains("window-title")) {
            defaultName = `Note ${windowId.replace("window", "")}`;
          } else if (element.classList.contains("task-title")) {
            defaultName = `Task List ${windowId.replace("window", "")}`;
          } else if (element.classList.contains("sticky-note-title")) {
            defaultName = `Sticky Note ${windowId.replace("sticky-note-", "")}`;
          } else if (windowId === "log") {
            defaultName = "Log";
          } else if (element.classList.contains("clock-title")) {
            defaultName = "Clock";
          }
          element.textContent = element.textContent.trim() || defaultName;

          currentEditable = null;
          saveSession();
        }
      }

      function cancelRename() {
        if (currentEditable) {
          const { windowId, element } = currentEditable;
          element.contentEditable = false;
          element.removeEventListener("keydown", handleRenameKeydown);
          element.removeEventListener("blur", endRename);
          document.removeEventListener("mousedown", handleOutsideClick);

          // Set default name if cancelled, based on window type
          let defaultName = "";
          if (element.classList.contains("window-title")) {
            defaultName = `Note ${windowId.replace("window", "")}`;
          } else if (element.classList.contains("task-title")) {
            defaultName = `Task List ${windowId.replace("window", "")}`;
          } else if (element.classList.contains("sticky-note-title")) {
            defaultName = `Sticky Note ${windowId.replace("sticky-note-", "")}`;
          } else if (windowId === "log") {
            defaultName = "Log";
          } else if (element.classList.contains("clock-title")) {
            defaultName = "Clock";
          }
          element.textContent = defaultName;

          currentEditable = null;
          saveSession();
        }
      }

          const text = await navigator.clipboard.readText();

          if (textarea && !textarea.readOnly) {
            textarea.value = text;
            updateLineNumbers(activeWindow);
            updateCounts(activeWindow);

            saveSession();

      function loadSession() {
        try {
          // Clear only this app's keys (safer than wiping the entire origin)
          localStorage.removeItem("notepadSession");
          localStorage.removeItem("calendarEvents");

          // Reset UI state
          document.getElementById("windows").innerHTML = ""; // Remove all windows
          document.body.className = "dark-mode"; // Set default theme
          document.querySelector(".nav-menu").classList.remove("collapsed"); // Expand nav menu
          document.getElementById("search-replace").classList.remove("active"); // Hide search/replace

      function loadSessionFromStorage(session) {

            windowElement.style.height = `${windowData.height}px`;

            windowElement.dataset.y = windowData.position.top;
            windowElement.dataset.width = windowData.width;
            windowElement.dataset.height = windowData.height;

            // Add to the window restoration logic in loadSessionFromStorage

            if (windowData.locked) {
              toggleWindowLock(newWindow.id);

              updateLineNumbers(newWindow.id);
              updateCounts(newWindow.id);

              log.style.top = `${session.log.position.top}px`;
              log.dataset.x = session.log.position.left;

                );
                if (lockBtn) {
                  lockBtn.textContent = "🔒";
                  lockBtn.classList.add("locked");
                }
                const content = stickyNoteElement.querySelector(
                  ".sticky-note-content"
                );
                if (content) {
                  content.readOnly = true;
                  content.style.pointerEvents = "none";
                }
                stickyNoteElement.style.resize = "none";
                const header = stickyNoteElement.querySelector(
                  ".sticky-note-header"
                );
                if (header) header.style.pointerEvents = "none";
              }
            }
          }
        });
      }

      // No automatic session loading on page load
      window.onload = () => {
        const savedSession = localStorage.getItem("notepadSession");
        if (savedSession) {
          try {
            const session = JSON.parse(savedSession);
            loadSessionFromStorage(session);
            showStatus("Session restored!");
          } catch (e) {
            console.error("Failed to load session:", e);
            showStatus("Failed to load session.");
          }
        } else {
          // Ensure fresh state on load
          document.body.className = "dark-mode";
          document.querySelector(".nav-menu").classList.remove("collapsed");
          document.getElementById("search-replace").classList.remove("active");
        }
      };

      // Save session automatically when the tab or browser closes
      window.addEventListener("beforeunload", (event) => {
        saveSession();
        // Optionally, show a confirmation dialog (not recommended for modern browsers)
        // event.preventDefault();
        // event.returnValue = '';
      });

      const resizeObserver = new ResizeObserver(() => {
        const taskWindows = document.querySelectorAll(".task-window");
        taskWindows.forEach((window) => {
          const taskList = window.querySelector(".task-list");
          if (taskList) {
            const headerHeight =
              window.querySelector(".task-header").offsetHeight || 30;

            taskList.style.maxHeight = `${
              window.offsetHeight - headerHeight - inputHeight - 20

          }
        });

      function clearNoteText(windowId) {
        const windowElement = document.getElementById(windowId);
        const textarea = document.getElementById(`clipboard-${windowId}`);

        // Check if window is locked
        if (windowElement && windowElement.dataset.locked === "true") {
          showStatus("Cannot clear note: Window is locked.");
          return;
        }

        if (textarea) {
          textarea.value = "";
          updateLineNumbers(windowId);
