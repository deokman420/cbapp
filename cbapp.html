      function downloadSessionJSON() {
        try {
          saveSession(); // Ensure latest state is saved
          const session = localStorage.getItem("notepadSession");
          if (!session) {
            showStatus("No session data to download.");
            return;
          }
          const blob = new Blob([session], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "cbapp-session.json";
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          showStatus("Session JSON downloaded!");
        } catch (e) {
          showStatus("Failed to download session.");
        }
      }

      function downloadCurrentHtml() {
        try {
          const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
          const blob = new Blob([html], { type: 'text/html' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'cbapp.html';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          showStatus('Downloaded cbapp.html');
        } catch (e) {
          showStatus('Failed to download HTML.');
        }
      }

      function importData() {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = ".json,application/json";
        input.style.display = "none";

        input.onchange = (event) => {
          const file = event.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (e) => {
            try {
              const text = e.target.result;
              if (typeof text !== "string" || text.length > 4500000) {
                showStatus("Import failed: file too large or invalid.");
                return;
              }
              const session = JSON.parse(text);
              // Basic structural sanity check before trusting the import
              if (!session || typeof session !== "object") {
                showStatus("Import failed: not a valid session file.");
                return;
              }
              localStorage.setItem("notepadSession", JSON.stringify(session));
              loadSession(); // Clear current UI
              loadSessionFromStorage(session); // Load imported session
              showStatus("Session imported!");
            } catch (err) {
              showStatus("Failed to import session.");
            }
          };
          reader.readAsText(file);
        };

        document.body.appendChild(input);
        input.click();
        document.body.removeChild(input);
      }
      let countdownInterval = null;
      let countdownEndTime = null;
      let countdownActive = false;
      let originalFavicon = null;

      function startCountdown() {
        const minInput = document.getElementById("countdown-minutes");
        const secInput = document.getElementById("countdown-seconds");
        const display = document.getElementById("countdown-display");
        let minutes = parseInt(minInput.value, 10) || 0;
        let seconds = parseInt(secInput.value, 10) || 0;
        let totalMs = (minutes * 60 + seconds) * 1000;
        if (totalMs <= 0) {
          showStatus("Please enter a time greater than 0.");
          return;
        }
        countdownEndTime = Date.now() + totalMs;
        countdownActive = true;
        updateCountdownDisplay();
        if (countdownInterval) clearInterval(countdownInterval);
        countdownInterval = setInterval(updateCountdownDisplay, 500);
        showStatus(`Countdown started for ${minutes} min ${seconds} sec!`);
      }

      function resetCountdown() {
        countdownActive = false;
        countdownEndTime = null;
        clearInterval(countdownInterval);
        const minInput = document.getElementById("countdown-minutes");
        const secInput = document.getElementById("countdown-seconds");
        const display = document.getElementById("countdown-display");
        let minutes = parseInt(minInput.value, 10) || 0;
        let seconds = parseInt(secInput.value, 10) || 0;
        display.textContent = `${Math.floor(minutes / 60)
          .toString()
          .padStart(2, "0")}:${(minutes % 60)
          .toString()
          .padStart(2, "0")}:${seconds.toString().padStart(2, "0")}`;
        restoreFavicon();
      }

      function updateCountdownDisplay() {
        const display = document.getElementById("countdown-display");
        if (!countdownActive || !countdownEndTime) return;
        let msLeft = countdownEndTime - Date.now();
        if (msLeft <= 0) {
          display.textContent = "00:00:00";
          countdownActive = false;
          clearInterval(countdownInterval);
          upliftingNotification();
          setCountdownFavicon();
          return;
        }
        let totalSeconds = Math.floor(msLeft / 1000);
        let h = Math.floor(totalSeconds / 3600);
        let m = Math.floor((totalSeconds % 3600) / 60);
        let s = totalSeconds % 60;
        display.textContent = `${h.toString().padStart(2, "0")}:${m
          .toString()
          .padStart(2, "0")}:${s.toString().padStart(2, "0")}`;
      }

      function upliftingNotification() {
        showStatus("🎉 Timer has been reached 🎉");
        if (window.Notification && Notification.permission === "granted") {
          new Notification("Timer has been reached");
        } else if (
          window.Notification &&
          Notification.permission !== "denied"
        ) {
          Notification.requestPermission().then((permission) => {
            if (permission === "granted") {
              new Notification("Timer has been reached");
            }
          });
        }
      }

      function setCountdownFavicon() {
        if (!originalFavicon) {
          const link = document.querySelector("link[rel~='icon']");
          if (link) originalFavicon = link.href;
        }
        let link = document.querySelector("link[rel~='icon']");
        if (!link) {
          link = document.createElement("link");
          link.rel = "icon";
          document.head.appendChild(link);
        }
        // Emoji favicon (works in most browsers)
        const canvas = document.createElement("canvas");
        canvas.width = 64;
        canvas.height = 64;
        const ctx = canvas.getContext("2d");
        ctx.font = "48px serif";
        ctx.fillText("🍽️", 8, 48);
        link.href = canvas.toDataURL();
      }

      function restoreFavicon() {
        if (originalFavicon) {
          let link = document.querySelector("link[rel~='icon']");
          if (link) link.href = originalFavicon;
        }
      }

      function addCalendarWindow() {
        try {
        if (document.getElementById("calendar-window")) {
          setActiveWindow("calendar-window");
          return;
        }

        const windowsContainer = document.getElementById("windows");
        const calendarWindow = document.createElement("div");
        calendarWindow.className = "window calendar-window";
        calendarWindow.id = "calendar-window";

        // Center the window
        const defaultWidth = 400;
        const defaultHeight = 600;
        const left = Math.max(0, (window.innerWidth - defaultWidth) / 2);
        const top = Math.max(0, (window.innerHeight - defaultHeight) / 2);

        calendarWindow.style.left = `${left}px`;
        calendarWindow.style.top = `${top}px`;
        calendarWindow.style.zIndex = zIndexCounter++;
        calendarWindow.dataset.x = left;
        calendarWindow.dataset.y = top;
        calendarWindow.dataset.width = defaultWidth;
        calendarWindow.dataset.height = defaultHeight;
        calendarWindow.style.width = `${defaultWidth}px`;
        calendarWindow.style.height = `${defaultHeight}px`;
        calendarWindow.dataset.year = new Date().getFullYear();
        calendarWindow.dataset.month = new Date().getMonth();

        calendarWindow.innerHTML = `
        <div class="window-header">
            <span class="window-title">Calendar</span>
            <div class="window-controls">
                <span class="edit-window" onclick="startRename('calendar-window')">✏️</span>
                <span class="close-window" onclick="closeWindow('calendar-window')">×</span>
            </div>
        </div>
        <div class="window-content">
            <div class="today-events">
                <h3>Today's Events</h3>
                <ul id="today-events-list"></ul>
            </div>
            <div class="calendar-header">
                <button onclick="navigateMonth(-1)">←</button>
                <span id="month-year"></span>
                <button onclick="goToToday()">Today</button>
                <button onclick="navigateMonth(1)">→</button>
            </div>
            <div class="calendar-grid" id="calendar-grid"></div>
            <div class="events-section">
                <h3>Events for <span id="selected-date"></span></h3>
                <ul id="events-list"></ul>
                <div style="display: flex; gap: 5px; margin-top: 10px;">
                    <input type="text" id="new-event" placeholder="Add new event" style="flex: 1;">
                    <button onclick="addCalendarEvent()">Add</button>
                </div>
            </div>
        </div>
    `;

        windowsContainer.appendChild(calendarWindow);
        makeDraggable(calendarWindow);
        calendarWindow.onclick = () => setActiveWindow("calendar-window");
        setActiveWindow("calendar-window");

        renderCalendar();
        updateTodayEvents();
        saveSession();
        showStatus("Calendar window created!");
        return calendarWindow;
        } catch (e) {
          console.warn("Calendar feature encountered an error (non-fatal):", e);
          showStatus("Calendar is not available.");
        }
      }
      function addCalendarEvent() {
        try {
        const date = document.getElementById("calendar-date")?.value;
        const descEl = document.getElementById("calendar-event");
        const desc = descEl ? descEl.value.trim() : "";
        if (!date || !desc) {
          showStatus("Please enter a date and event.");
          return;
        }
        let events = JSON.parse(localStorage.getItem("calendarEvents") || "{}");
        if (!events[date]) events[date] = [];
        events[date].push(desc);
        localStorage.setItem("calendarEvents", JSON.stringify(events));
        document.getElementById("calendar-event").value = "";
        loadCalendarEvents();
        showStatus("Event added!");
        saveSession();
        } catch (e) { console.warn("addCalendarEvent error (non-fatal)"); }
      }

      function loadCalendarEvents() {
        try {
        const dateEl = document.getElementById("calendar-date");
        const list = document.getElementById("calendar-events-list");
        if (!dateEl || !list) return;
        const date = dateEl.value;
        let events = JSON.parse(localStorage.getItem("calendarEvents") || "{}");
        let html = "";
        if (date && events[date]) {
          html = events[date]
            .map(
              (e, i) =>
                `<div>${e} <button onclick="deleteCalendarEvent('${date}',${i})">🗑️</button></div>`
            )
            .join("");
        } else {
          html = "<em>No events for this date.</em>";
        }
        list.innerHTML = html;
        } catch (e) { console.warn("loadCalendarEvents error (non-fatal)"); }
      }

      function deleteCalendarEvent(date, idx) {
        try {
        let events = JSON.parse(localStorage.getItem("calendarEvents") || "{}");
        if (events[date]) {
          events[date].splice(idx, 1);
          if (events[date].length === 0) delete events[date];
          localStorage.setItem("calendarEvents", JSON.stringify(events));
          loadCalendarEvents();
          showStatus("Event deleted!");
          saveSession();
        }
        } catch (e) { console.warn("deleteCalendarEvent error (non-fatal)"); }
      }

      document.addEventListener("change", function (e) {
        if (e.target && e.target.id === "calendar-date") {
          try { loadCalendarEvents(); } catch (e) {}
        }
      });

      // --- Nav Tooltips ---
      const navTooltip = document.createElement("div");
      navTooltip.id = "nav-tooltip";
      document.body.appendChild(navTooltip);
      let tooltipHideTimer = null;

      function showNavTooltip(target) {
        const text = target.getAttribute("data-tooltip");
        if (!text) return;
        const type = target.getAttribute("data-tooltip-type");
        let html = `<div class="nav-tooltip-title">${text}</div>`;
        if (type) {
          let selector = "";
          let titleSelector = "";
          let filter = null;
          if (type === "note") {
            selector = ".window";
            titleSelector = ".window-title";
            filter = (name) => !/^T2 Template(\s|$)/.test(name);
          } else if (type === "t2") {
            selector = ".window";
            titleSelector = ".window-title";
            filter = (name) => /^T2 Template(\s|$)/.test(name);
          } else if (type === "task") {
            selector = ".task-window";
            titleSelector = ".task-title";
          } else if (type === "sticky") {
            selector = ".sticky-note-window";
            titleSelector = ".sticky-note-title";
          } else if (type === "calculator") {
            selector = "#calculator";
            titleSelector = ".calculator-title";
          } else if (type === "clock") {
            selector = "#clock";
            titleSelector = ".clock-title";
          } else if (type === "help") {
            selector = ".help-window";
            titleSelector = ".help-title";
            filter = () => true;
          }
          const items = Array.from(document.querySelectorAll(selector));
          if (items.length > 0) {
            html += '<div class="nav-tooltip-list">';
            items.forEach((win) => {
              const name =
                win.querySelector(titleSelector)?.textContent || win.id;
              if (filter && !filter(name)) return;
              html += `<button class="nav-tooltip-link" data-target-id="${win.id}">- ${name}</button>`;
            });
            html += "</div>";
          }
        }
        navTooltip.innerHTML = html;
        navTooltip
          .querySelectorAll(".nav-tooltip-link")
          .forEach((link) => {
            link.addEventListener("click", (event) => {
              event.preventDefault();
              event.stopPropagation();
              const targetId = link.getAttribute("data-target-id");
              const win = document.getElementById(targetId);
              if (win) {
                win.style.display = "";
                setActiveWindow(targetId);
              }
            });
          });
        const rect = target.getBoundingClientRect();
        const top = rect.top - 8;
        navTooltip.style.left = `${rect.left + rect.width / 2}px`;
        navTooltip.style.top = `${top}px`;
        navTooltip.style.transform = "translate(-50%, -100%)";
        navTooltip.classList.add("visible");
      }

      function hideNavTooltip() {
        navTooltip.classList.remove("visible");
      }

      document.querySelectorAll(".nav-menu [data-tooltip]").forEach((el) => {
        el.addEventListener("mouseenter", () => {
          if (tooltipHideTimer) clearTimeout(tooltipHideTimer);
          showNavTooltip(el);
        });
        el.addEventListener("mouseleave", () => {
          tooltipHideTimer = setTimeout(() => {
            if (!navTooltip.matches(":hover")) hideNavTooltip();
          }, 120);
        });
      });

      navTooltip.addEventListener("mouseenter", () => {
        if (tooltipHideTimer) clearTimeout(tooltipHideTimer);
      });
      navTooltip.addEventListener("mouseleave", hideNavTooltip);

      // --- Calendar hardening stubs (prevent crashes from incomplete feature) ---
      function updateTodayEvents() {
        // No-op stub: the calendar UI is not fully wired in this build.
        // Prevents ReferenceError if renderCalendar or load paths are reached.
      }
      function showEvents(dateStr) {
        // Safe stub — shows a gentle message instead of throwing.
        try { showStatus("Calendar view is not available in this version."); } catch (e) {}
      }

      function renderCalendar() {
        try {
        const calendarWindow = document.getElementById("calendar-window");
        if (!calendarWindow) return;

        const year = parseInt(calendarWindow.dataset.year);
        const month = parseInt(calendarWindow.dataset.month);
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const events = JSON.parse(
          localStorage.getItem("calendarEvents") || "{}"
        );

        let daysHTML = "";
        for (let i = 0; i < firstDay; i++) {
          daysHTML += '<div class="day empty"></div>';
        }

        const today = new Date().toISOString().split("T")[0];
        for (let day = 1; day <= daysInMonth; day++) {
          const dateStr = `${year}-${String(month + 1).padStart(
            2,
            "0"
          )}-${String(day).padStart(2, "0")}`;
          const hasEvents = events[dateStr] && events[dateStr].length > 0;
          const isToday = dateStr === today;
          daysHTML += `
            <div class="day${hasEvents ? " has-events" : ""}${
            isToday ? " today" : ""
          }" 
                 onclick="showEvents('${dateStr}')" 
                 data-date="${dateStr}">
                ${day}
            </div>`;
        }

        const monthNames = [
          "January",
          "February",
          "March",
          "April",
          "May",
          "June",
          "July",
          "August",
          "September",
          "October",
          "November",
          "December",
        ];

        document.getElementById(
          "month-year"
        ).textContent = `${monthNames[month]} ${year}`;
        document.getElementById("calendar-grid").innerHTML = `
        <div class="day-name">Sun</div>
        <div class="day-name">Mon</div>
        <div class="day-name">Tue</div>
        <div class="day-name">Wed</div>
        <div class="day-name">Thu</div>
        <div class="day-name">Fri</div>
        <div class="day-name">Sat</div>
        ${daysHTML}
    `;

        updateTodayEvents();
        } catch (e) { console.warn("renderCalendar error (non-fatal)"); }
      }

      function navigateMonth(delta) {
        try {
        const calendarWindow = document.getElementById("calendar-window");
        if (!calendarWindow) return;

        let year = parseInt(calendarWindow.dataset.year);
        let month = parseInt(calendarWindow.dataset.month);

        month += delta;
        if (month < 0) {
          month = 11;
          year--;
        } else if (month > 11) {
          month = 0;
          year++;
        }

        calendarWindow.dataset.year = year;
        calendarWindow.dataset.month = month;
        renderCalendar();
        } catch (e) { console.warn("navigateMonth error (non-fatal)"); }
      }

      function goToToday() {
        try {
        const calendarWindow = document.getElementById("calendar-window");
        if (!calendarWindow) return;

        const today = new Date();
        calendarWindow.dataset.year = today.getFullYear();
        calendarWindow.dataset.month = today.getMonth();
        renderCalendar();
        showStatus("Navigated to today");
        } catch (e) { console.warn("goToToday error (non-fatal)"); }
      }
